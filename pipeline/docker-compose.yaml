# docker-compose.yml
# Specify the Docker Compose file format version

services:
  pgdatabase:
    image: postgres:18

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ny_taxi
    volumes:
      - ny_taxi_postgres_data:/var/lib/postgresql # Changed to /var/lib/postgresql/data for modern Postgres images
    ports:
      - "5432:5432"


  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
      PGADMIN_LISTEN_PORT: 80 # Explicitly set the internal port
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8085:80" # Map host port 8085 to container port 80


volumes:
  ny_taxi_postgres_data: # Define the named volume for PostgreSQL data persistence
  pgadmin_data: # Define the named volume for pgAdmin data persistence